<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غير متصل - مهاراتي</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        * {
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            direction: rtl;
            text-align: right;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .offline-container {
            text-align: center;
            max-width: 500px;
            padding: 2rem;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .offline-icon {
            font-size: 5rem;
            color: #6c757d;
            margin-bottom: 1rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #1e5366, #4a90a4);
            border: none;
            border-radius: 10px;
            padding: 12px 24px;
            font-weight: 600;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #4a90a4, #1e5366);
        }
        
        .feature-list {
            text-align: right;
            margin: 2rem 0;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
            padding: 0.5rem;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .feature-item i {
            margin-left: 1rem;
            color: #1e5366;
        }
    </style>
</head>

<body>
    <div class="offline-container">
        <div class="offline-icon">
            <i class="fas fa-wifi-slash"></i>
        </div>
        
        <h2 class="fw-bold mb-3">غير متصل بالإنترنت</h2>
        <p class="text-muted mb-4">
            يبدو أنك غير متصل بالإنترنت حالياً. تحقق من اتصالك وحاول مرة أخرى.
        </p>
        
        <div class="feature-list">
            <div class="feature-item">
                <i class="fas fa-book"></i>
                <span>يمكنك تصفح المحتوى المحفوظ مسبقاً</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-sync"></i>
                <span>سيتم مزامنة تقدمك عند العودة للاتصال</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-download"></i>
                <span>حمل التطبيق للوصول السريع</span>
            </div>
        </div>
        
        <div class="d-grid gap-2">
            <button class="btn btn-primary" onclick="checkConnection()">
                <i class="fas fa-refresh me-2"></i>
                إعادة المحاولة
            </button>
            <button class="btn btn-outline-secondary" onclick="goHome()">
                <i class="fas fa-home me-2"></i>
                العودة للرئيسية
            </button>
        </div>
        
        <div class="mt-4">
            <small class="text-muted">
                <i class="fas fa-info-circle me-1"></i>
                منصة مهاراتي تعمل بشكل أفضل مع الاتصال بالإنترنت
            </small>
        </div>
    </div>

    <script>
        function checkConnection() {
            if (navigator.onLine) {
                // Try to reload the page
                window.location.reload();
            } else {
                // Show connection status
                showConnectionStatus();
            }
        }
        
        function goHome() {
            window.location.href = '/';
        }
        
        function showConnectionStatus() {
            const button = document.querySelector('.btn-primary');
            const originalText = button.innerHTML;
            
            button.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>جاري التحقق...';
            button.disabled = true;
            
            setTimeout(() => {
                if (navigator.onLine) {
                    button.innerHTML = '<i class="fas fa-check me-2"></i>متصل!';
                    button.classList.remove('btn-primary');
                    button.classList.add('btn-success');
                    
                    setTimeout(() => {
                        window.location.reload();
                    }, 1000);
                } else {
                    button.innerHTML = '<i class="fas fa-times me-2"></i>لا يزال غير متصل';
                    button.classList.remove('btn-primary');
                    button.classList.add('btn-danger');
                    
                    setTimeout(() => {
                        button.innerHTML = originalText;
                        button.classList.remove('btn-danger');
                        button.classList.add('btn-primary');
                        button.disabled = false;
                    }, 2000);
                }
            }, 1500);
        }
        
        // Listen for online/offline events
        window.addEventListener('online', function() {
            console.log('Back online');
            const button = document.querySelector('.btn-primary');
            button.innerHTML = '<i class="fas fa-check me-2"></i>متصل! جاري التحديث...';
            button.classList.remove('btn-primary');
            button.classList.add('btn-success');
            
            setTimeout(() => {
                window.location.reload();
            }, 1500);
        });
        
        window.addEventListener('offline', function() {
            console.log('Gone offline');
        });
        
        // Auto-retry connection every 30 seconds
        setInterval(() => {
            if (navigator.onLine) {
                // Ping the server to check if it's really available
                fetch('/', { method: 'HEAD', cache: 'no-cache' })
                    .then(() => {
                        window.location.reload();
                    })
                    .catch(() => {
                        // Still offline or server unavailable
                    });
            }
        }, 30000);
    </script>
</body>
</html>
